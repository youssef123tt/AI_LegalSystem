# =============================================================================
# Docker Compose for AI Legal Knowledge Assistant
# =============================================================================
#
# WHAT CHANGED IN MILESTONE 2
# ----------------------------
# 1. Build context for api & worker changed from apps/api → apps/
#    (so both can COPY the shared/ package).
# 2. Added "migrate" one-shot service (runs alembic upgrade head).
# 3. Added "upload_data" volume shared by api and worker.
# 4. api now depends on migrate completing successfully.
#
# HOW TO RUN
# ----------
# docker compose -f .\infra\docker-compose.yml up --build
# =============================================================================

services:
  # ─── Postgres ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-legal_rag}
      POSTGRES_USER: ${POSTGRES_USER:-legal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-legal}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20

  # ─── Redis ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  # ─── OpenSearch ────────────────────────────────────────────────────────
  opensearch:
    image: opensearchproject/opensearch:2
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms1g -Xmx1g"
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  # ─── OpenSearch Dashboards (optional UI) ───────────────────────────────
  dashboards:
    image: opensearchproject/opensearch-dashboards:2
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    ports:
      - "5601:5601"
    depends_on:
      opensearch:
        condition: service_healthy

  # ─── Migrate (one-shot) ────────────────────────────────────────────────
  # Runs Alembic migrations and then exits.  This ensures the database
  # tables exist BEFORE the API starts accepting requests.
  migrate:
    build:
      context: ../apps
      dockerfile: api/Dockerfile
    working_dir: /app/shared
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-legal}:${POSTGRES_PASSWORD:-legal}@postgres:5432/${POSTGRES_DB:-legal_rag}
      PYTHONPATH: /app
    command: ["python", "-m", "alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy

  # ─── API (FastAPI) ─────────────────────────────────────────────────────
  api:
    build:
      context: ../apps
      dockerfile: api/Dockerfile
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-legal}:${POSTGRES_PASSWORD:-legal}@postgres:5432/${POSTGRES_DB:-legal_rag}
      REDIS_URL: redis://redis:6379/0
      OPENSEARCH_URL: ${OPENSEARCH_URL:-http://opensearch:9200}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
      UPLOAD_DIR: /data/uploads
    ports:
      - "8000:8000"
    volumes:
      - upload_data:/data/uploads
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      opensearch:
        condition: service_healthy

  # ─── Worker (Celery) ───────────────────────────────────────────────────
  worker:
    build:
      context: ../apps
      dockerfile: worker/Dockerfile
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-legal}:${POSTGRES_PASSWORD:-legal}@postgres:5432/${POSTGRES_DB:-legal_rag}
      REDIS_URL: redis://redis:6379/0
      OPENSEARCH_URL: ${OPENSEARCH_URL:-http://opensearch:9200}
    volumes:
      - upload_data:/data/uploads
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      opensearch:
        condition: service_healthy

volumes:
  postgres_data:
  opensearch_data:
  upload_data:
