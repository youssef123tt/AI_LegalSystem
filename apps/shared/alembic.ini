# Alembic configuration for the shared database models.

[alembic]
# Path to migration scripts (relative to this file).
script_location = alembic

# The database URL is injected at runtime from the DATABASE_URL
# environment variable (see alembic/env.py).  This placeholder
# is never actually used.
sqlalchemy.url = postgresql+psycopg://legal:legal@localhost:5432/legal_rag

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
